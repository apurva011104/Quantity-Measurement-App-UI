<div class="login-left-side">
    <div class="logo-container">
        <img src="assets/images/logo.png" id="logo-image">
    </div>
</div>

<div class="login-right-side">
    <form class="login-form" (submit)="submit($event)">

        <!-- NAME (only for register) -->
        <div class="form-item" *ngIf="isRegister">
            <label>Name</label>
            <input type="text" [(ngModel)]="name" name="name">
        </div>

        <!-- EMAIL -->
        <div class="form-item">
            <label>Email</label>
            <input type="email" [(ngModel)]="email" name="email">
        </div>

        <!-- PASSWORD -->
        <div class="form-item">
            <label>Password</label>
            <input type="password" [(ngModel)]="password" name="password">
        </div>

        <!-- TOGGLE -->
        <div class="login-or-register" (click)="toggle()">
            {{ isRegister ? 'Already have an account? Sign in' : "Don't have an account? Sign up" }}
        </div>

        <!-- BUTTON -->
        <button type="submit">
            {{ isRegister ? 'Sign up!' : 'Login' }}
        </button>

        <div class="divider">OR</div>

        <!-- GOOGLE LOGIN -->
        <button type="button" class="google-btn" (click)="googleLogin()">
            Continue with Google
        </button>

    </form>
</div>
