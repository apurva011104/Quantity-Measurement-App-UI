<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../styles/index.css" rel="stylesheet">
    <link href="../styles/login.css" rel="stylesheet">
</head>
<body>
    <div class="login-left-side">
        <div class="logo-container">
            <img id="logo-image" src="../assets/images/logo.png" alt="logo">
        </div>
    </div>
    <div class="login-right-side">
        <form class="login-form">
            <div class="form-item name">
                <label for="name">Name</label>
                <input type="text" id="name" name="name">
            </div>
            <div class="form-item">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-item">
                <label for="password">Password</label>
                <input type="password" id="password" name="password">
            </div>
            <div class="login-or-register">Already have an account? Sign in</div>
            <button type="submit">Sign up!</button>

            <div class="divider">OR</div>
            <button type="button" id="googleLoginBtn" class="google-btn">
                Continue with Google
            </button>
        </form>
        
    </div>
    <script src="../scripts/pages/login.js"></script>
</body>
</html>
